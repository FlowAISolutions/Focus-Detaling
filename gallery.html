<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Gallery — Focus Detailing</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,opsz,wght@0,9..40,300;0,9..40,400;0,9..40,500;0,9..40,600;0,9..40,700;1,9..40,400&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg:         #0C0C0C;
      --bg-2:       #111111;
      --surface:    #161616;
      --lift:       #1C1C1C;
      --border:     #212121;
      --muted:      #666666;
      --dim:        #999999;
      --fg:         #EDECEA;
      --accent:     #D41132;
      --font:       'DM Sans', ui-sans-serif, system-ui, sans-serif;
    }

    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
    html { scroll-behavior: smooth; }

    body {
      background-color: var(--bg);
      color: var(--fg);
      font-family: var(--font);
      font-size: 16px;
      line-height: 1.5;
      -webkit-font-smoothing: antialiased;
      -moz-osx-font-smoothing: grayscale;
    }

    ::-webkit-scrollbar        { width: 6px; }
    ::-webkit-scrollbar-thumb  { background: var(--accent); border-radius: 0; }
    ::-webkit-scrollbar-track  { background: #0d0d0d; }
    ::selection                { background: rgba(212,17,50,0.3); color: #fff; }

    a   { text-decoration: none; color: inherit; }
    img { display: block; max-width: 100%; }

    .container { max-width: 1160px; margin: 0 auto; padding: 0 40px; }

    .btn {
      display: inline-flex;
      align-items: center;
      gap: 10px;
      font-family: var(--font);
      font-size: 12px;
      font-weight: 600;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      padding: 13px 24px;
      border: none;
      cursor: pointer;
      border-radius: 0;
      transition: background 0.2s, transform 0.15s;
    }
    .btn-red { background: var(--accent); color: #fff; }
    .btn-red:hover  { background: #b5102b; transform: translateY(-1px); }
    .btn-red:active { transform: translateY(0); }

    .eyebrow {
      font-size: 11px;
      font-weight: 700;
      letter-spacing: 0.2em;
      text-transform: uppercase;
      color: var(--accent);
      display: block;
    }

    /* ════════════════════════════════════════════════════════════
       NAV
    ════════════════════════════════════════════════════════════ */
    #nav {
      position: fixed;
      top: 0; left: 0; right: 0;
      z-index: 200;
      background: rgba(12,12,12,0.96);
      backdrop-filter: blur(14px);
      -webkit-backdrop-filter: blur(14px);
      border-bottom: 1px solid var(--border);
      padding: 0 40px;
      height: 68px;
      display: grid;
      grid-template-columns: 1fr auto 1fr;
      align-items: center;
    }
    #nav > nav { grid-column: 2; }
    #nav > a.btn { grid-column: 3; justify-self: end; }

    .nav-links { display: flex; list-style: none; gap: 36px; }
    .nav-links a {
      font-size: 13px;
      font-weight: 500;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      color: var(--muted);
      transition: color 0.2s;
    }
    .nav-links a:hover  { color: var(--fg); }
    .nav-links a.active { color: var(--fg); }

    /* ── Hamburger ─────────────────────────────────────────────── */
    .hamburger {
      display: none;
      flex-direction: column;
      justify-content: center;
      gap: 5px;
      width: 40px;
      height: 40px;
      background: transparent;
      border: none;
      cursor: pointer;
      padding: 9px;
      grid-column: 3;
      justify-self: end;
    }
    .hamburger span {
      display: block;
      width: 22px;
      height: 1.5px;
      background: var(--fg);
      transition: transform 0.22s, opacity 0.18s;
      transform-origin: center;
    }
    .hamburger.open span:nth-child(1) { transform: translateY(6.5px) rotate(45deg); }
    .hamburger.open span:nth-child(2) { opacity: 0; transform: scaleX(0); }
    .hamburger.open span:nth-child(3) { transform: translateY(-6.5px) rotate(-45deg); }

    /* ── Mobile Nav ─────────────────────────────────────────────── */
    .mobile-nav {
      display: none;
      position: fixed;
      top: 68px; left: 0; right: 0; bottom: 0;
      background: var(--bg);
      z-index: 198;
      flex-direction: column;
      align-items: stretch;
      overflow-y: auto;
    }
    .mobile-nav.open { display: flex; }
    .mobile-links { list-style: none; flex: 1; }
    .mobile-links li { border-bottom: 1px solid var(--border); }
    .mobile-links a {
      display: block;
      font-size: 13px;
      font-weight: 500;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      color: var(--muted);
      padding: 20px 24px;
      transition: color 0.2s, background 0.2s;
    }
    .mobile-links a:hover  { color: var(--fg); background: var(--surface); }
    .mobile-links a.active { color: var(--fg); }
    .mobile-cta { padding: 24px; border-top: 1px solid var(--border); }
    .mobile-cta .btn { width: 100%; justify-content: center; }

    /* ── Lang Toggle ──────────────────────────────────────────── */
    .lang-toggle { display: flex; align-items: center; gap: 8px; }
    .lang-label {
      font-size: 11px;
      font-weight: 700;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      color: var(--muted);
      cursor: pointer;
      user-select: none;
      transition: color 0.2s;
    }
    .lang-toggle[data-lang="en"] .lang-label.lang-en,
    .lang-toggle[data-lang="hu"] .lang-label.lang-hu { color: var(--fg); }
    .lang-switch {
      position: relative;
      width: 40px;
      height: 22px;
      background: var(--lift);
      border: 1px solid var(--border);
      border-radius: 11px;
      cursor: pointer;
      padding: 0;
      transition: background 0.2s, border-color 0.2s;
    }
    .lang-switch:focus-visible { outline: 2px solid var(--accent); outline-offset: 2px; }
    .lang-switch[aria-checked="true"] { background: var(--accent); border-color: var(--accent); }
    .lang-thumb {
      position: absolute;
      top: 2px; left: 2px;
      width: 16px; height: 16px;
      background: var(--fg);
      border-radius: 50%;
      pointer-events: none;
      transition: transform 0.22s cubic-bezier(0.34, 1.56, 0.64, 1);
    }
    .lang-switch[aria-checked="true"] .lang-thumb { transform: translateX(18px); }

    /* ════════════════════════════════════════════════════════════
       GALLERY HEADER
    ════════════════════════════════════════════════════════════ */
    #gallery-header {
      padding-top: 68px;
      position: relative;
      overflow: hidden;
    }

    .gallery-hero {
      min-height: 200px;
      border-bottom: 1px solid var(--border);
      display: flex;
      align-items: center;
      justify-content: center;
      text-align: center;
      padding: 60px 40px;
    }

    .gallery-title {
      font-size: clamp(3.5rem, 8vw, 7rem);
      font-weight: 700;
      letter-spacing: -0.04em;
      line-height: 0.9;
      color: var(--fg);
    }

    /* ════════════════════════════════════════════════════════════
       GALLERY GRID
    ════════════════════════════════════════════════════════════ */
    #gallery-section {
      padding: 0 0 120px;
    }

    .gallery-grid {
      display: grid;
      grid-template-columns: repeat(2, 1fr);
      gap: 1px;
      background: var(--border);
    }

    /* ── Gallery Card ────────────────────────────────────────── */
    .gallery-card {
      background: var(--bg);
      position: relative;
      overflow: hidden;
    }

    .card-media {
      position: relative;
      overflow: hidden;
      background: var(--surface);
    }

    .card-footer {
      padding: 20px 24px;
      border-top: 1px solid var(--border);
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
    }

    .card-label {
      font-size: 13px;
      font-weight: 500;
      letter-spacing: 0.04em;
      color: var(--fg);
      flex: 1;
      min-width: 0;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }

    .card-type-badge {
      font-size: 10px;
      font-weight: 700;
      letter-spacing: 0.16em;
      text-transform: uppercase;
      color: var(--muted);
      flex-shrink: 0;
    }

    .card-img {
      width: 100%;
      height: auto;
      display: block;
    }

    .card-video {
      width: 100%;
      height: auto;
      display: block;
    }

    /* ════════════════════════════════════════════════════════════
       RESPONSIVE
    ════════════════════════════════════════════════════════════ */
    @media (max-width: 768px) {
      #nav          { padding: 0 24px; }
      .nav-links    { display: none; }
      .container    { padding: 0 24px; }
      .hamburger    { display: flex; }
      #nav > a.btn  { display: none; }

      .gallery-hero        { min-height: auto; padding: 44px 24px; }
      .gallery-title       { font-size: clamp(3rem, 14vw, 5rem); }

      .gallery-grid        { grid-template-columns: 1fr; }
      #gallery-section     { padding: 0 0 80px; }
      .card-footer         { padding: 14px 16px; }
      .card-video          { max-height: 260px; object-fit: contain; background: #000; }
    }

    @media (max-width: 480px) {
      .gallery-hero  { padding: 30px 16px; }
      .gallery-title { font-size: clamp(2.5rem, 13vw, 3.5rem); }
      .card-footer   { padding: 12px 14px; }
      .card-label    { font-size: 12px; }
    }
  </style>
</head>
<body>

  <!-- ══ NAV ══════════════════════════════════════════════════════ -->
  <header id="nav">
    <div class="lang-toggle" id="langToggle" data-lang="en">
      <span class="lang-label lang-en">EN</span>
      <button class="lang-switch" id="langSwitch" role="switch" aria-checked="false" aria-label="Switch language">
        <div class="lang-thumb"></div>
      </button>
      <span class="lang-label lang-hu">HU</span>
    </div>
    <nav>
      <ul class="nav-links">
        <li><a href="index.html" data-i18n="nav-home">Home</a></li>
        <li><a href="index.html#packages" data-i18n="nav-packages">Packages</a></li>
        <li><a href="gallery.html" class="active" data-i18n="nav-gallery">Gallery</a></li>
        <li><a href="contact.html" data-i18n="nav-contact">Contact</a></li>
      </ul>
    </nav>
    <a href="booking.html" class="btn btn-red" data-i18n="nav-book">Book Now</a>
    <button id="hamburger" class="hamburger" aria-label="Open menu" aria-expanded="false">
      <span></span><span></span><span></span>
    </button>
  </header>

  <div id="mobile-nav" class="mobile-nav" aria-hidden="true">
    <ul class="mobile-links">
      <li><a href="index.html" data-i18n="nav-home">Home</a></li>
      <li><a href="index.html#packages" data-i18n="nav-packages">Packages</a></li>
      <li><a href="gallery.html" class="active" data-i18n="nav-gallery">Gallery</a></li>
      <li><a href="contact.html" data-i18n="nav-contact">Contact</a></li>
    </ul>
    <div class="mobile-cta">
      <a href="booking.html" class="btn btn-red" data-i18n="nav-book">Book Now</a>
    </div>
  </div>

  <!-- ══ GALLERY HEADER ══════════════════════════════════════════ -->
  <div id="gallery-header">
    <div class="gallery-hero">
      <h1 class="gallery-title">Gallery</h1>
    </div>
  </div>

  <!-- ══ GALLERY GRID ══════════════════════════════════════════════ -->
  <section id="gallery-section">
    <div class="gallery-grid">

      <div class="gallery-card">
        <div class="card-media">
          <img class="card-img" src="detailing videos/detail pic1.jpg" alt="Full Detail Transformation">
        </div>
        <div class="card-footer">
          <span class="card-label">Full Detail Transformation</span>
        </div>
      </div>

      <div class="gallery-card">
        <div class="card-media">
          <img class="card-img" src="detailing videos/detail pic2.jpg" alt="Before &amp; After Detail">
        </div>
        <div class="card-footer">
          <span class="card-label">Before &amp; After Detail</span>
        </div>
      </div>

      <div class="gallery-card">
        <div class="card-media">
          <video class="card-video" src="detailing videos/detailing video.mp4"
                 controls preload="metadata" playsinline></video>
        </div>
        <div class="card-footer">
          <span class="card-label">Detailing Video 1</span>
        </div>
      </div>

      <div class="gallery-card">
        <div class="card-media">
          <video class="card-video" src="detailing videos/detailing video 2.mp4"
                 controls preload="metadata" playsinline></video>
        </div>
        <div class="card-footer">
          <span class="card-label">Detailing Video 2</span>
        </div>
      </div>

    </div>
  </section>

  <script>
    (function () {
      const hamburger = document.getElementById('hamburger');
      const mobileNav = document.getElementById('mobile-nav');
      if (!hamburger || !mobileNav) return;
      hamburger.addEventListener('click', () => {
        const open = hamburger.classList.toggle('open');
        hamburger.setAttribute('aria-expanded', String(open));
        mobileNav.setAttribute('aria-hidden', String(!open));
        mobileNav.classList.toggle('open');
        document.body.style.overflow = open ? 'hidden' : '';
      });
      mobileNav.querySelectorAll('a').forEach(a => {
        a.addEventListener('click', () => {
          hamburger.classList.remove('open');
          hamburger.setAttribute('aria-expanded', 'false');
          mobileNav.setAttribute('aria-hidden', 'true');
          mobileNav.classList.remove('open');
          document.body.style.overflow = '';
        });
      });
    })();
  </script>
  <script src="lang.js"></script>
</body>
</html>
