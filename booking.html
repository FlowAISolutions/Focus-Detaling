<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Book a Session — Focus Detailing</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,opsz,wght@0,9..40,300;0,9..40,400;0,9..40,500;0,9..40,600;0,9..40,700;1,9..40,400&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg:       #0C0C0C;
      --bg-2:     #111111;
      --surface:  #161616;
      --lift:     #1C1C1C;
      --lift-2:   #222222;
      --border:   #212121;
      --border-2: #2c2c2c;
      --muted:    #666666;
      --dim:      #999999;
      --fg:       #EDECEA;
      --accent:   #D41132;
      --accent-2: #b5102b;
      --font:     'DM Sans', ui-sans-serif, system-ui, sans-serif;
    }

    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
    html { height: 100%; }

    body {
      background: var(--bg);
      color: var(--fg);
      font-family: var(--font);
      font-size: 15px;
      line-height: 1.5;
      -webkit-font-smoothing: antialiased;
      height: 100%;
    }

    ::-webkit-scrollbar { width: 4px; height: 4px; }
    ::-webkit-scrollbar-thumb { background: #2a2a2a; }
    ::-webkit-scrollbar-track { background: transparent; }
    ::selection { background: rgba(212,17,50,0.3); color: #fff; }

    a { text-decoration: none; color: inherit; }
    img { display: block; max-width: 100%; }

    /* ════════════════════════════════════════════
       NAV
    ════════════════════════════════════════════ */
    #nav {
      position: fixed;
      top: 0; left: 0; right: 0;
      z-index: 200;
      background: rgba(12,12,12,0.97);
      backdrop-filter: blur(16px);
      -webkit-backdrop-filter: blur(16px);
      border-bottom: 1px solid var(--border);
      padding: 0 40px;
      height: 64px;
      display: grid;
      grid-template-columns: 1fr auto 1fr;
      align-items: center;
    }

    #nav > nav { grid-column: 2; }
    #nav > a.btn { grid-column: 3; justify-self: end; }

    .nav-links { display: flex; list-style: none; gap: 36px; }
    .nav-links a {
      font-size: 12px;
      font-weight: 500;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      color: var(--muted);
      transition: color 0.2s;
    }
    .nav-links a:hover { color: var(--fg); }

    .btn {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      font-family: var(--font);
      font-size: 11px;
      font-weight: 700;
      letter-spacing: 0.13em;
      text-transform: uppercase;
      padding: 11px 22px;
      border: none;
      cursor: pointer;
      transition: background 0.2s, transform 0.15s;
    }
    .btn-red { background: var(--accent); color: #fff; }
    .btn-red:hover { background: var(--accent-2); }
    .btn-red:active { transform: translateY(1px); }
    .btn-ghost {
      background: transparent;
      color: var(--dim);
      border: 1px solid var(--border-2);
    }
    .btn-ghost:hover { color: var(--fg); border-color: var(--muted); }
    .btn-ghost:active { transform: translateY(1px); }

    /* ════════════════════════════════════════════
       KOALENDAR EMBED
    ════════════════════════════════════════════ */
    .koalendar-wrap {
      margin-top: 64px;
      min-height: calc(100vh - 64px);
      background: var(--bg);
    }

    #inline-widget-meet-with-mate-4 {
      width: 100%;
      min-height: calc(100vh - 64px);
    }

    /* ── Lang Toggle ──────────────────────────────────────────── */
    .lang-toggle {
      display: flex;
      align-items: center;
      gap: 8px;
    }
    .lang-label {
      font-size: 11px;
      font-weight: 700;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      color: var(--muted);
      cursor: pointer;
      user-select: none;
      transition: color 0.2s;
    }
    .lang-toggle[data-lang="en"] .lang-label.lang-en,
    .lang-toggle[data-lang="hu"] .lang-label.lang-hu { color: var(--fg); }
    .lang-switch {
      position: relative;
      width: 40px;
      height: 22px;
      background: var(--lift);
      border: 1px solid var(--border-2);
      border-radius: 11px;
      cursor: pointer;
      padding: 0;
      transition: background 0.2s, border-color 0.2s;
    }
    .lang-switch:focus-visible { outline: 2px solid var(--accent); outline-offset: 2px; }
    .lang-switch[aria-checked="true"] { background: var(--accent); border-color: var(--accent); }
    .lang-thumb {
      position: absolute;
      top: 2px; left: 2px;
      width: 16px; height: 16px;
      background: var(--fg);
      border-radius: 50%;
      pointer-events: none;
      transition: transform 0.22s cubic-bezier(0.34, 1.56, 0.64, 1);
    }
    .lang-switch[aria-checked="true"] .lang-thumb { transform: translateX(18px); }

    /* ── Hamburger ─────────────────────────────────────────────── */
    .hamburger {
      display: none;
      flex-direction: column;
      justify-content: center;
      gap: 5px;
      width: 40px;
      height: 40px;
      background: transparent;
      border: none;
      cursor: pointer;
      padding: 9px;
      grid-column: 3;
      justify-self: end;
    }
    .hamburger span {
      display: block;
      width: 22px;
      height: 1.5px;
      background: var(--fg);
      transition: transform 0.22s, opacity 0.18s;
      transform-origin: center;
    }
    .hamburger.open span:nth-child(1) { transform: translateY(6.5px) rotate(45deg); }
    .hamburger.open span:nth-child(2) { opacity: 0; transform: scaleX(0); }
    .hamburger.open span:nth-child(3) { transform: translateY(-6.5px) rotate(-45deg); }

    /* ── Mobile Nav ─────────────────────────────────────────────── */
    .mobile-nav {
      display: none;
      position: fixed;
      top: 64px; left: 0; right: 0; bottom: 0;
      background: var(--bg);
      z-index: 198;
      flex-direction: column;
      align-items: stretch;
      overflow-y: auto;
    }
    .mobile-nav.open { display: flex; }
    .mobile-links { list-style: none; flex: 1; }
    .mobile-links li { border-bottom: 1px solid var(--border); }
    .mobile-links a {
      display: block;
      font-size: 13px;
      font-weight: 500;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      color: var(--muted);
      padding: 20px 24px;
      transition: color 0.2s, background 0.2s;
    }
    .mobile-links a:hover { color: var(--fg); background: var(--surface); }
    .mobile-cta { padding: 24px; border-top: 1px solid var(--border); }
    .mobile-cta .btn { width: 100%; justify-content: center; }

    /* ── Mobile layout overrides ─────────────────────────────────── */
    @media (max-width: 768px) {
      html, body { height: auto; }

      #nav         { padding: 0 20px; }
      .nav-links   { display: none; }
      .hamburger   { display: flex; }
      #nav > a.btn { display: none; }
    }
  </style>
</head>
<body>

<!-- NAV -->
<header id="nav">
  <!-- Language toggle (grid col 1) -->
  <div class="lang-toggle" id="langToggle" data-lang="en">
    <span class="lang-label lang-en">EN</span>
    <button class="lang-switch" id="langSwitch" role="switch" aria-checked="false" aria-label="Switch language">
      <div class="lang-thumb"></div>
    </button>
    <span class="lang-label lang-hu">HU</span>
  </div>
  <nav>
    <ul class="nav-links">
      <li><a href="index.html" data-i18n="nav-home">Home</a></li>
      <li><a href="index.html#packages" data-i18n="nav-services">Services</a></li>
      <li><a href="index.html#references" data-i18n="nav-gallery">Gallery</a></li>
      <li><a href="contact.html" data-i18n="nav-contact">Contact</a></li>
    </ul>
  </nav>
  <a href="index.html" class="btn btn-ghost">← Back</a>
  <button id="hamburger" class="hamburger" aria-label="Open menu" aria-expanded="false">
    <span></span><span></span><span></span>
  </button>
</header>

<div id="mobile-nav" class="mobile-nav" aria-hidden="true">
  <ul class="mobile-links">
    <li><a href="index.html" data-i18n="nav-home">Home</a></li>
    <li><a href="index.html#packages" data-i18n="nav-services">Services</a></li>
    <li><a href="about.html" data-i18n="nav-about">About</a></li>
    <li><a href="contact.html" data-i18n="nav-contact">Contact</a></li>
  </ul>
  <div class="mobile-cta">
    <a href="index.html" class="btn btn-ghost">← Back to Home</a>
  </div>
</div>

<!-- KOALENDAR BOOKING EMBED -->
<div class="koalendar-wrap">
  <div id="inline-widget-meet-with-mate-4"></div>
</div>

<script>window.Koalendar=window.Koalendar||function(){(Koalendar.props=Koalendar.props||[]).push(arguments)};</script>
<script async src="https://koalendar.com/assets/widget.js"></script>
<script>Koalendar('inline', {"url":"https://koalendar.com/e/meet-with-mate-4","selector":"#inline-widget-meet-with-mate-4"});</script>

<script src="lang.js"></script>
<script>
  (function () {
    const hamburger = document.getElementById('hamburger');
    const mobileNav = document.getElementById('mobile-nav');
    if (!hamburger || !mobileNav) return;
    hamburger.addEventListener('click', () => {
      const open = hamburger.classList.toggle('open');
      hamburger.setAttribute('aria-expanded', String(open));
      mobileNav.setAttribute('aria-hidden', String(!open));
      mobileNav.classList.toggle('open');
    });
    mobileNav.querySelectorAll('a').forEach(a => {
      a.addEventListener('click', () => {
        hamburger.classList.remove('open');
        hamburger.setAttribute('aria-expanded', 'false');
        mobileNav.setAttribute('aria-hidden', 'true');
        mobileNav.classList.remove('open');
      });
    });
  })();
</script>
</body>
</html>
