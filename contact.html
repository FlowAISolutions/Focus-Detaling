<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Contact — Focus Detailing</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,opsz,wght@0,9..40,300;0,9..40,400;0,9..40,500;0,9..40,600;0,9..40,700;1,9..40,400&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg:         #0C0C0C;
      --bg-2:       #111111;
      --surface:    #161616;
      --lift:       #1C1C1C;
      --border:     #212121;
      --muted:      #666666;
      --dim:        #999999;
      --fg:         #EDECEA;
      --accent:     #D41132;
      --font:       'DM Sans', ui-sans-serif, system-ui, sans-serif;
    }

    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
    html { scroll-behavior: smooth; }

    body {
      background-color: var(--bg);
      color: var(--fg);
      font-family: var(--font);
      font-size: 16px;
      line-height: 1.5;
      -webkit-font-smoothing: antialiased;
      -moz-osx-font-smoothing: grayscale;
    }

    ::-webkit-scrollbar        { width: 6px; }
    ::-webkit-scrollbar-thumb  { background: var(--accent); border-radius: 0; }
    ::-webkit-scrollbar-track  { background: #0d0d0d; }
    ::selection                { background: rgba(212,17,50,0.3); color: #fff; }

    a   { text-decoration: none; color: inherit; }
    img { display: block; max-width: 100%; }

    /* ── Layout ─────────────────────────────────────────────────── */
    .container { max-width: 1160px; margin: 0 auto; padding: 0 40px; }

    /* ── Buttons ─────────────────────────────────────────────────── */
    .btn {
      display: inline-flex;
      align-items: center;
      gap: 10px;
      font-family: var(--font);
      font-size: 12px;
      font-weight: 600;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      padding: 13px 24px;
      border: none;
      cursor: pointer;
      border-radius: 0;
      transition: background 0.2s, transform 0.15s;
    }
    .btn-red { background: var(--accent); color: #fff; }
    .btn-red:hover  { background: #b5102b; transform: translateY(-1px); }
    .btn-red:active { transform: translateY(0); }

    .btn-outline { background: transparent; color: var(--fg); border: 1px solid var(--border); }
    .btn-outline:hover { border-color: var(--dim); }

    /* ── Typography ──────────────────────────────────────────────── */
    .eyebrow {
      font-size: 11px;
      font-weight: 700;
      letter-spacing: 0.2em;
      text-transform: uppercase;
      color: var(--accent);
      margin-bottom: 16px;
      display: block;
    }
    .section-heading {
      font-size: clamp(1.9rem, 3vw, 2.75rem);
      font-weight: 700;
      letter-spacing: -0.025em;
      line-height: 1.08;
      color: var(--fg);
    }

    /* ════════════════════════════════════════════════════════════
       NAV
    ════════════════════════════════════════════════════════════ */
    #nav {
      position: fixed;
      top: 0; left: 0; right: 0;
      z-index: 200;
      background: rgba(12,12,12,0.96);
      backdrop-filter: blur(14px);
      -webkit-backdrop-filter: blur(14px);
      border-bottom: 1px solid var(--border);
      padding: 0 40px;
      height: 68px;
      display: grid;
      grid-template-columns: 1fr auto 1fr;
      align-items: center;
    }
    #nav > nav { grid-column: 2; }
    #nav > a.btn { grid-column: 3; justify-self: end; }

    .nav-links { display: flex; list-style: none; gap: 36px; }
    .nav-links a {
      font-size: 13px;
      font-weight: 500;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      color: var(--muted);
      transition: color 0.2s;
    }
    .nav-links a:hover { color: var(--fg); }
    .nav-links a.active { color: var(--fg); }

    /* ════════════════════════════════════════════════════════════
       CONTACT PAGE
    ════════════════════════════════════════════════════════════ */
    #contact-page {
      min-height: 100vh;
      padding-top: 68px;
      display: flex;
      flex-direction: column;
    }

    /* ── Page header ─────────────────────────────────────────── */
    .contact-header {
      padding: 72px 40px 56px;
      max-width: 1160px;
      margin: 0 auto;
      width: 100%;
    }

    /* ── Main grid ───────────────────────────────────────────── */
    .contact-grid {
      flex: 1;
      display: grid;
      grid-template-columns: 1fr 1fr;
      max-width: 1160px;
      margin: 0 auto;
      width: 100%;
      padding: 0 40px 80px;
      gap: 64px;
    }

    /* ── Form panel ──────────────────────────────────────────── */
    .form-panel {}

    .form-panel h2 {
      font-size: 14px;
      font-weight: 600;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      color: var(--muted);
      margin-bottom: 32px;
      padding-bottom: 16px;
      border-bottom: 1px solid var(--border);
    }

    .field-group {
      display: flex;
      flex-direction: column;
      gap: 20px;
      margin-bottom: 32px;
    }

    .field {
      display: flex;
      flex-direction: column;
      gap: 8px;
    }

    .field label {
      font-size: 11px;
      font-weight: 700;
      letter-spacing: 0.15em;
      text-transform: uppercase;
      color: var(--dim);
    }

    .field input {
      background: var(--surface);
      border: 1px solid var(--border);
      color: var(--fg);
      font-family: var(--font);
      font-size: 15px;
      font-weight: 400;
      padding: 14px 16px;
      outline: none;
      border-radius: 0;
      transition: border-color 0.2s;
      width: 100%;
    }

    .field input::placeholder {
      color: var(--muted);
      font-size: 14px;
    }

    .field input:focus {
      border-color: var(--accent);
    }

    .field input:hover:not(:focus) {
      border-color: #333;
    }

    /* ── Map panel ───────────────────────────────────────────── */
    .map-panel {}

    .map-panel h2 {
      font-size: 14px;
      font-weight: 600;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      color: var(--muted);
      margin-bottom: 32px;
      padding-bottom: 16px;
      border-bottom: 1px solid var(--border);
    }

    .map-wrapper {
      position: relative;
      width: 100%;
      height: 380px;
      background: var(--surface);
      border: 1px solid var(--border);
      overflow: hidden;
    }

    .map-wrapper iframe {
      width: 100%;
      height: 100%;
      border: none;
      display: block;
      filter: grayscale(1) invert(1) brightness(0.85) contrast(0.9);
    }

    /* red accent line under map */
    .map-wrapper::after {
      content: '';
      position: absolute;
      bottom: 0; left: 0; right: 0;
      height: 2px;
      background: var(--accent);
      z-index: 2;
      pointer-events: none;
    }

    .map-address {
      margin-top: 20px;
      display: flex;
      align-items: flex-start;
      gap: 12px;
    }

    .map-address-icon {
      width: 32px;
      height: 32px;
      background: var(--accent);
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
    }

    .map-address-icon svg {
      width: 14px;
      height: 14px;
      fill: #fff;
    }

    .map-address-text {
      font-size: 14px;
      color: var(--dim);
      line-height: 1.6;
    }

    .map-address-text strong {
      display: block;
      font-size: 13px;
      font-weight: 600;
      color: var(--fg);
      margin-bottom: 2px;
    }

    /* ════════════════════════════════════════════════════════════
       RESPONSIVE
    ════════════════════════════════════════════════════════════ */
    @media (max-width: 900px) {
      .contact-grid {
        grid-template-columns: 1fr;
        gap: 48px;
      }
    }

    @media (max-width: 768px) {
      #nav           { padding: 0 24px; }
      .nav-links     { display: none; }
      .contact-header { padding: 56px 24px 40px; }
      .contact-grid  { padding: 0 24px 64px; gap: 40px; }
      .map-wrapper   { height: 280px; }
    }

    /* ── Lang Toggle ──────────────────────────────────────────── */
    .lang-toggle {
      display: flex;
      align-items: center;
      gap: 8px;
    }
    .lang-label {
      font-size: 11px;
      font-weight: 700;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      color: var(--muted);
      cursor: pointer;
      user-select: none;
      transition: color 0.2s;
    }
    .lang-toggle[data-lang="en"] .lang-label.lang-en,
    .lang-toggle[data-lang="hu"] .lang-label.lang-hu { color: var(--fg); }
    .lang-switch {
      position: relative;
      width: 40px;
      height: 22px;
      background: var(--lift);
      border: 1px solid var(--border);
      border-radius: 11px;
      cursor: pointer;
      padding: 0;
      transition: background 0.2s, border-color 0.2s;
    }
    .lang-switch:focus-visible { outline: 2px solid var(--accent); outline-offset: 2px; }
    .lang-switch[aria-checked="true"] { background: var(--accent); border-color: var(--accent); }
    .lang-thumb {
      position: absolute;
      top: 2px; left: 2px;
      width: 16px; height: 16px;
      background: var(--fg);
      border-radius: 50%;
      pointer-events: none;
      transition: transform 0.22s cubic-bezier(0.34, 1.56, 0.64, 1);
    }
    .lang-switch[aria-checked="true"] .lang-thumb { transform: translateX(18px); }
  </style>
</head>
<body>

  <!-- ══ NAV ══════════════════════════════════════════════════════ -->
  <header id="nav">
    <div class="lang-toggle" id="langToggle" data-lang="en">
      <span class="lang-label lang-en">EN</span>
      <button class="lang-switch" id="langSwitch" role="switch" aria-checked="false" aria-label="Switch language">
        <div class="lang-thumb"></div>
      </button>
      <span class="lang-label lang-hu">HU</span>
    </div>
    <nav>
      <ul class="nav-links">
        <li><a href="index.html" data-i18n="nav-home">Home</a></li>
        <li><a href="index.html#packages" data-i18n="nav-packages">Packages</a></li>
        <li><a href="about.html" data-i18n="nav-about">About</a></li>
        <li><a href="contact.html" class="active" data-i18n="nav-contact">Contact</a></li>
      </ul>
    </nav>
    <a href="booking.html" class="btn btn-red" data-i18n="nav-book">Book Now</a>
  </header>

  <!-- ══ CONTACT PAGE ═══════════════════════════════════════════════ -->
  <main id="contact-page">

    <div class="contact-header">
      <span class="eyebrow">Get in Touch</span>
      <h1 class="section-heading">Contact Us</h1>
    </div>

    <div class="contact-grid">

      <!-- ── Form ─────────────────────────────────────────────── -->
      <div class="form-panel">
        <h2>Your Details</h2>
        <div class="field-group">
          <div class="field">
            <label for="name">Full Name</label>
            <input type="text" id="name" name="name" placeholder="e.g. John Smith" autocomplete="name">
          </div>
          <div class="field">
            <label for="phone">Phone Number</label>
            <input type="tel" id="phone" name="phone" placeholder="e.g. +36 30 123 4567" autocomplete="tel">
          </div>
          <div class="field">
            <label for="email">Email Address</label>
            <input type="email" id="email" name="email" placeholder="e.g. john@example.com" autocomplete="email">
          </div>
        </div>
        <button type="submit" class="btn btn-red" style="width:100%; justify-content:center;">Send Message</button>
      </div>

      <!-- ── Map ──────────────────────────────────────────────── -->
      <div class="map-panel">
        <h2>Find Us</h2>
        <div class="map-wrapper">
          <iframe
            src="https://www.google.com/maps/embed?pb=!1m18!1m12!1m3!1d2695.9!2d19.040236!3d47.497913!2m3!1f0!2f0!3f0!3m2!1i1024!2i768!4f13.1!3m3!1m2!1s0x4741c334d1d4cfc9%3A0x400c4290c1e1160!2sBudapest%2C+Hungary!5e0!3m2!1sen!2s!4v1"
            allowfullscreen=""
            loading="lazy"
            referrerpolicy="no-referrer-when-downgrade"
            title="Focus Detailing location">
          </iframe>
        </div>
        <div class="map-address">
          <div class="map-address-icon">
            <svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
              <path d="M12 2C8.13 2 5 5.13 5 9c0 5.25 7 13 7 13s7-7.75 7-13c0-3.87-3.13-7-7-7zm0 9.5c-1.38 0-2.5-1.12-2.5-2.5s1.12-2.5 2.5-2.5 2.5 1.12 2.5 2.5-1.12 2.5-2.5 2.5z"/>
            </svg>
          </div>
          <div class="map-address-text">
            <strong>Focus Detailing</strong>
            Placeholder Address, Budapest, Hungary
          </div>
        </div>
      </div>

    </div>
  </main>

  <script src="lang.js"></script>
</body>
</html>
